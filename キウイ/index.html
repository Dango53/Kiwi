<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>キウイの暴走</title>
    <style>

        h1 { font-size: 80px; color: #ff4040; margin-bottom: 20px; text-shadow: 2px 2px 0 #000; }
        body { margin: 0; overflow: hidden; background: #222; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        
        /* メニュー・ポーズ画面 */
        .overlay {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 20;
        }
        .btn {
            padding: 12px 25px; font-size: 18px; cursor: pointer; margin: 8px;
            background: #444; color: white; border: 2px solid #fff; border-radius: 8px;
            transition: 0.1s;
        }
        .btn:active { transform: scale(0.95); background: #666; }
        .btn.active { background: #008800; border-color: #00ff00; }
        
        /* BGM切り替えボタン（左上） */
        #bgm-toggle-btn {
            position: absolute; top: 15px; left: 15px;
            padding: 8px 15px; font-size: 14px; background: rgba(255,255,255,0.1);
            color: #fff; border: 1px solid #fff; border-radius: 5px; cursor: pointer;
            z-index: 30;
        }
        #bgm-toggle-btn:hover { background: rgba(255,255,255,0.2); }

        #ui { 
            position: absolute; top: 10px; left: 10px; color: #fff; 
            font-size: 16px; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px; pointer-events: none; 
        }
        #mobile-pause {
            position: absolute; top: 10px; right: 10px; padding: 10px 15px;
            background: #ffaa00; color: white; border: none; border-radius: 5px; z-index: 15; font-weight: bold;
        }
        
        #joystick-base {
            position: absolute; bottom: 50px; left: 50px;
            width: 100px; height: 100px; background: rgba(255,255,255,0.2);
            border-radius: 50%; display: none; z-index: 5;
        }
        #joystick-stick {
            position: absolute; top: 25px; left: 25px;
            width: 50px; height: 50px; background: rgba(255,255,255,0.5); border-radius: 50%;
        }
        #countdown {
            position: absolute; width: 100%; height: 100%;
            display: none; align-items: center; justify-content: center;
            font-size: 100px; font-weight: bold; color: #fff; text-shadow: 4px 4px 0 #000;
            z-index: 25; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="main-menu" class="overlay">
        <button id="bgm-toggle-btn" onclick="toggleBgm()">BGM: ON</button>

        <h1>キウイの暴走</h1>
        <div style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; text-align: center; margin-bottom:10px;">
            モード：
            <button id="role-oni" class="btn active" onclick="setRole('oni')">キウイ</button>
            <button id="role-nigeyaku" class="btn" onclick="setRole('nigeyaku')">生徒</button>
            <br>
            制限時間：
            <select id="time-limit" style="padding:8px; font-size:16px;">
                <option value="30">30秒</option>
                <option value="60" selected>60秒</option>
                <option value="120">120秒</option>
            </select>
        </div>
        <div class="stage-select">
            <button class="btn" onclick="preStart('classroom')">教室</button>
            <button class="btn" onclick="preStart('gym')">体育館</button>
            <button class="btn" onclick="preStart('music')">音楽室</button>
            <button class="btn" onclick="preStart('ground')">運動場</button>
        </div>
    </div>

    <div id="pause-menu" class="overlay" style="display:none;">
        <h1>PAUSE</h1>
        <button class="btn" onclick="togglePause()">再開（Q）</button>
        <button class="btn" style="border-color:#00aaff" onclick="resetGame()">リセット (R)</button>
        <button class="btn" style="border-color:#ff5555" onclick="backToMenu()">タイトルに戻る</button>
    </div>

    <div id="countdown"></div>
    <div id="ui">
        残り: <span id="timer">--</span>秒 | <span id="score">0</span> / 33
    </div>
    <button id="mobile-pause" style="display:none;" onclick="togglePause()">一時停止（Q）</button>

    <div id="joystick-base"><div id="joystick-stick"></div></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const timerElement = document.getElementById('timer');
        const countdownEl = document.getElementById('countdown');
        const mainMenu = document.getElementById('main-menu');
        const pauseMenu = document.getElementById('pause-menu');
        const mobilePauseBtn = document.getElementById('mobile-pause');
        const joyBase = document.getElementById('joystick-base');
        const joyStick = document.getElementById('joystick-stick');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let gameRunning = false, isPaused = false, currentStage = 'classroom';
        let playerRole = 'oni', score = 0, timeLeft = 60, lastTime = 0;
        let isBgmEnabled = true; // BGMの設定状態
        const keys = {}, obstacles = [], enemies = [];
        const player = { x: 0, y: 0, size: 22, color: '#2ecc71', speed: 4.5, angle: 0 };
        const aiOni = { x: 0, y: 0, size: 25, color: '#2ecc71', speed: 3.2 };

        // BGMの設定
        const bgm = new Audio('bgm.mp3'); 
        bgm.loop = true;
        bgm.volume = 0.2;

        // BGM切り替え関数
        function toggleBgm() {
            isBgmEnabled = !isBgmEnabled;
            const btn = document.getElementById('bgm-toggle-btn');
            btn.innerText = isBgmEnabled ? 'BGM: ON' : 'BGM: OFF';
            
            if (!isBgmEnabled) {
                bgm.pause();
            } else if (gameRunning && !isPaused) {
                bgm.play().catch(() => {});
            }
            playSound('btn');
        }

        // 効果音エンジン
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (type === 'btn') {
                osc.frequency.setValueAtTime(880, now); gain.gain.setValueAtTime(0.05, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(); osc.stop(now + 0.1);
            } else if (type === 'catch') {
                osc.frequency.setValueAtTime(440, now); osc.frequency.exponentialRampToValueAtTime(880, now + 0.1);
                gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(); osc.stop(now + 0.2);
            } else if (type === 'fail') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(110, now);
                gain.gain.setValueAtTime(0.05, now); gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(); osc.stop(now + 0.3);
            }
        }

        function setRole(role) { playSound('btn'); playerRole = role; document.getElementById('role-oni').className = role === 'oni' ? 'btn active' : 'btn'; document.getElementById('role-nigeyaku').className = role === 'nigeyaku' ? 'btn active' : 'btn'; }

        function preStart(stage) {
            currentStage = stage;
            playSound('btn');
            
            // BGMの再生判断
            if (isBgmEnabled) {
                bgm.play().catch(() => {});
            }

            mainMenu.style.display = 'none';
            pauseMenu.style.display = 'none';
            countdownEl.style.display = 'flex';
            let count = 3;
            countdownEl.innerText = count;
            const timer = setInterval(() => {
                count--;
                if (count > 0) { countdownEl.innerText = count; playSound('btn'); }
                else if (count === 0) { countdownEl.innerText = "START!"; playSound('catch'); }
                else { clearInterval(timer); countdownEl.style.display = 'none'; initGame(stage); }
            }, 800);
        }

        function isColliding(x, y, size) {
            if (x < 0 || x > canvas.width - size || y < 0 || y > canvas.height - size) return true;
            for (let ob of obstacles) if (x < ob.x + ob.w && x + size > ob.x && y < ob.y + ob.h && y + size > ob.y) return true;
            return false;
        }

        function initGame(stageType) {
            score = 0; scoreElement.innerText = score;
            timeLeft = parseInt(document.getElementById('time-limit').value);
            obstacles.length = 0; enemies.length = 0;
            player.color = playerRole === 'oni' ? '#2ecc71' : '#e74c3c';

            // ステージ構築 (教室・体育館・音楽室・運動場)
            if (stageType === 'classroom') {
                canvas.style.background = "#f4a460";
                obstacles.push({ x: canvas.width/2-250, y: 15, w: 500, h: 20, color: '#2f4f4f' });
                obstacles.push({ x: canvas.width/2+260, y: 15, w: 70, h: 50, color: '#333' });
                for (let i = 0; i < 6; i++) for (let j = 0; j < 6; j++) obstacles.push({ x: 120 + j*140, y: 160 + i*90, w: 50, h: 35, color: '#deb887' });
            } else if (stageType === 'gym') {
                canvas.style.background = "#ffd3a3";
                for (let i = 0; i < 5; i++) obstacles.push({ x: 150 + i*280, y: canvas.height/2-50, w: 90, h: 140, color: '#cd853f' });
            } else if (stageType === 'music') {
                canvas.style.background = "#443333";
                obstacles.push({ x: 80, y: 80, w: 120, h: 100, color: '#000' }); 
                obstacles.push({ x: 350, y: 120, w: 80, h: 80, color: '#999' }); 
                for(let i=0; i<3; i++) obstacles.push({ x: 550 + i*90, y: 40, w: 50, h: 70, color: '#222' });
                for(let i=0; i<6; i++) obstacles.push({ x: 150 + i*180, y: canvas.height-140, w: 35, h: 10, color: '#555' });
                obstacles.push({ x: canvas.width-120, y: 180, w: 35, h: 150, color: '#d4af37' });
            } else {
                canvas.style.background = "#edc9af";
                for (let i = 0; i < 45; i++) {
                    let ox, oy;
                    do { ox = Math.random()*canvas.width; oy = Math.random()*canvas.height; } while(Math.abs(ox-100)<100 && Math.abs(oy-100)<100);
                    obstacles.push({ x: ox, y: oy, w: 25, h: 25, color: '#888' });
                }
            }

            player.x = 50; player.y = 50;
            while(isColliding(player.x, player.y, player.size)) { player.x += 10; player.y += 10; }

            if (playerRole === 'nigeyaku') {
                do { aiOni.x = Math.random()*canvas.width; aiOni.y = Math.random()*canvas.height; } while(isColliding(aiOni.x, aiOni.y, aiOni.size) || Math.sqrt((aiOni.x-player.x)**2+(aiOni.y-player.y)**2) < 300);
            }
            for (let i = 0; i < 33; i++) {
                let ex, ey;
                do { ex = Math.random()*canvas.width; ey = Math.random()*canvas.height; } while(isColliding(ex, ey, 12) || Math.sqrt((ex-player.x)**2+(ey-player.y)**2) < 150);
                enemies.push({ x: ex, y: ey, size: 12, color: '#e74c3c', speed: 2 + Math.random() });
            }

            gameRunning = true; isPaused = false;
            mobilePauseBtn.style.display = 'block'; joyBase.style.display = 'block';
            lastTime = Date.now();
            requestAnimationFrame(gameLoop);
        }

        // スマホ操作
        let joyPos = { x: 0, y: 0 }, isTouching = false;
        window.addEventListener('touchstart', e => { 
            if (e.touches[0].clientX < canvas.width / 2) { 
                isTouching = true; 
                joyBase.style.left = (e.touches[0].clientX-50)+'px'; 
                joyBase.style.top = (e.touches[0].clientY-50)+'px'; 
            } 
        });
        window.addEventListener('touchmove', e => { 
            if (!isTouching) return; 
            const rect = joyBase.getBoundingClientRect(); 
            const dx = e.touches[0].clientX-(rect.left+50), dy = e.touches[0].clientY-(rect.top+50); 
            const dist = Math.min(Math.sqrt(dx*dx+dy*dy), 50), angle = Math.atan2(dy, dx); 
            joyStick.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`; 
            joyPos = { x: Math.cos(angle)*(dist/50), y: Math.sin(angle)*(dist/50) }; 
        });
        window.addEventListener('touchend', () => { isTouching = false; joyPos = { x: 0, y: 0 }; joyStick.style.transform = 'none'; });

        // キーボード操作
        window.addEventListener('keydown', e => { 
            keys[e.key] = true; 
            if (e.key === 'q' || e.key === 'Q') togglePause(); 
            if (e.key === 'r' || e.key === 'R') resetGame(); 
        });
        window.addEventListener('keyup', e => keys[e.key] = false);

        function togglePause() { 
            if(!gameRunning) return;
            playSound('btn'); 
            isPaused = !isPaused; 
            pauseMenu.style.display = isPaused ? 'flex' : 'none'; 
            
            if (isPaused) {
                bgm.pause();
            } else {
                if (isBgmEnabled) bgm.play().catch(() => {});
                lastTime = Date.now(); 
                requestAnimationFrame(gameLoop); 
            } 
        }

        function resetGame() { 
            playSound('btn'); 
            preStart(currentStage); 
        }

        function backToMenu() { 
            playSound('btn'); 
            bgm.pause();
            bgm.currentTime = 0;
            gameRunning = false; isPaused = false; 
            pauseMenu.style.display = 'none'; mainMenu.style.display = 'flex'; 
            mobilePauseBtn.style.display = 'none'; joyBase.style.display = 'none'; 
        }

        function update() {
            if (isPaused) return;
            let now = Date.now(); timeLeft -= (now - lastTime) / 1000; timerElement.innerText = Math.max(0, Math.ceil(timeLeft)); lastTime = now;
            if (timeLeft <= 0) { playSound('fail'); alert("タイムアップ！"); backToMenu(); return; }

            let mx = 0, my = 0;
            if (keys['w'] || keys['ArrowUp']) my = -1; if (keys['s'] || keys['ArrowDown']) my = 1;
            if (keys['a'] || keys['ArrowLeft']) mx = -1; if (keys['d'] || keys['ArrowRight']) mx = 1;
            if (isTouching) { mx = joyPos.x; my = joyPos.y; }

            if (mx !== 0 || my !== 0) {
                player.angle = Math.atan2(my, mx);
                let nX = player.x + mx * player.speed, nY = player.y + my * player.speed;
                if (!isColliding(nX, player.y, player.size)) player.x = nX;
                if (!isColliding(player.x, nY, player.size)) player.y = nY;
            }

            if (playerRole === 'oni') {
                enemies.forEach((e, i) => {
                    const dx = e.x-player.x, dy = e.y-player.y, d = Math.sqrt(dx*dx+dy*dy);
                    if (d < 200) {
                        let vX = (dx/d)*e.speed, vY = (dy/d)*e.speed;
                        if (!isColliding(e.x+vX, e.y, e.size)) e.x += vX;
                        if (!isColliding(e.x, e.y+vY, e.size)) e.y += vY;
                    }
                    if (d < player.size + e.size) { enemies.splice(i, 1); score++; playSound('catch'); }
                });
                scoreElement.innerText = score;
                if (score >= 33) { alert("全員捕まえた！"); backToMenu(); }
            } else {
                let targets = [player, ...enemies];
                let closest = null, minDist = Infinity;
                targets.forEach(t => {
                    let d = Math.sqrt((t.x-aiOni.x)**2 + (t.y-aiOni.y)**2);
                    if (d < minDist) { minDist = d; closest = t; }
                });
                if (closest) {
                    let dx = closest.x-aiOni.x, dy = closest.y-aiOni.y, d = Math.sqrt(dx*dx+dy*dy);
                    let vX = (dx/d)*aiOni.speed, vY = (dy/d)*aiOni.speed;
                    if (!isColliding(aiOni.x+vX, aiOni.y, aiOni.size)) aiOni.x += vX;
                    if (!isColliding(aiOni.x, aiOni.y+vY, aiOni.size)) aiOni.y += vY;
                }
                if (Math.sqrt((player.x-aiOni.x)**2+(player.y-aiOni.y)**2) < player.size + aiOni.size) { playSound('fail'); alert("捕まった！"); backToMenu(); }
                enemies.forEach((e, i) => { if(Math.sqrt((e.x-aiOni.x)**2+(e.y-aiOni.y)**2) < e.size + aiOni.size) enemies.splice(i, 1); });
                scoreElement.innerText = enemies.length + 1;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            obstacles.forEach(ob => { ctx.fillStyle = ob.color; ctx.fillRect(ob.x, ob.y, ob.w, ob.h); });
            enemies.forEach(e => { ctx.fillStyle = e.color; ctx.beginPath(); ctx.arc(e.x, e.y, e.size, 0, Math.PI*2); ctx.fill(); });
            ctx.fillStyle = player.color; ctx.fillRect(player.x, player.y, player.size, player.size);
            ctx.fillStyle = "white"; ctx.font = "bold 13px sans-serif"; ctx.textAlign = "center";
            ctx.fillText("キウイ（あなた）", player.x + player.size/2, player.y - 15);
            ctx.save();
            ctx.translate(player.x + player.size/2, player.y + player.size/2);
            ctx.rotate(player.angle);
            ctx.strokeStyle = "rgba(255,255,255,0.8)"; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(15, 0); ctx.lineTo(30, 0); ctx.lineTo(25, -5); ctx.moveTo(30, 0); ctx.lineTo(25, 5); ctx.stroke();
            ctx.restore();
            if (playerRole === 'nigeyaku') {
                ctx.fillStyle = aiOni.color; ctx.fillRect(aiOni.x, aiOni.y, aiOni.size, aiOni.size);
                ctx.fillStyle = "white"; ctx.fillText("キウイ（鬼）", aiOni.x+aiOni.size/2, aiOni.y-10);
            }
        }
        function gameLoop() { if (gameRunning && !isPaused) { update(); draw(); requestAnimationFrame(gameLoop); } }
    </script>
</body>
</html>
